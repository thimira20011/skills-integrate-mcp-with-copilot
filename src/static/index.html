<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div id="auth-widget">
        <button id="auth-toggle-btn" class="icon-btn" aria-label="Teacher account menu">👤</button>
        <div id="auth-panel" class="hidden">
          <p id="auth-status">Not logged in</p>
          <button id="open-login-btn" type="button">Login</button>
          <button id="logout-btn" type="button" class="hidden">Logout</button>
        </div>
      </div>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <p class="admin-note">Teacher login required for registration changes.</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <div id="login-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="login-title">
      <div class="modal-content">
        <button id="close-login-modal" class="icon-btn close-btn" type="button" aria-label="Close login dialog">×</button>
        <h3 id="login-title">Teacher Login</h3>
        <form id="login-form">
          <div class="form-group">
            <label for="teacher-username">Username:</label>
            <input type="text" id="teacher-username" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="teacher-password">Password:</label>
            <input type="password" id="teacher-password" required autocomplete="current-password" />
          </div>
          <button type="submit">Login</button>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
